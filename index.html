<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>UTP BusTracker</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="view-map" class="view">
        <div class="map-wrapper">
            <div id="map"></div>
            <div class="floating-card">
                <h3>Live Status</h3>
                <p id="eta-display">Waiting for GPS signal...</p>
            </div>
        </div>
    </div>

    <div id="view-routes" class="view" style="display:none; padding: 20px;"><h2>Routes Coming Soon</h2></div>
    <div id="view-buses" class="view" style="display:none; padding: 20px;"><h2>Buses Coming Soon</h2></div>
    <div id="view-schedule" class="view" style="display:none; padding: 20px;"><h2>Schedule Coming Soon</h2></div>
  </body>
</html>
