<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Shuttle Tracker</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    
    <style>
      body { margin: 0; font-family: sans-serif; background: #f4f4f9; }
      .header { text-align: center; padding: 20px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: relative; z-index: 1000; }
      #eta-display { color: #007bff; margin-top: 10px; }
      /* 2. The map needs a strictly defined height to render */
      #map { height: 75vh; width: 100%; } 
    </style>
  </head>
  <body>
    
    <div class="header">
      <h1>Smart Shuttle Live Tracker</h1>
      <h2 id="eta-display">Waiting for GPS signal...</h2>
    </div>

    <div id="map"></div>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
